services:
  db:
    image: postgres:17-alpine
    container_name: orocampo_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.prod
    container_name: orocampo_api_prod
    restart: always
    ports:
      - "4001:4001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      PORT: "4001"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
    container_name: orocampo_web_prod
    restart: always
    ports:
      - "4000:4000"
    environment:
      API_URL: http://api:4001
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    depends_on:
      - api

volumes:
  postgres_data_prod:
