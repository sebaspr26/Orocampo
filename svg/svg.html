  <title>Animación de Trazo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
    }

    svg {
      width: min(90vw, 500px);
      height: auto;
    }

    /* Todos los paths empiezan invisibles */
    svg path {
      fill: none;
      stroke: #ffffff;
      stroke-width: 8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    button {
      margin-top: 24px;
      padding: 10px 28px;
      background: transparent;
      color: #fff;
      border: 1px solid #555;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      letter-spacing: 1px;
      transition: border-color 0.2s, color 0.2s;
    }
    button:hover { border-color: #fff; }
  </style>

  <button onclick="reiniciar()">↺ Repetir animación</button>

  <script>
    function animarTrazo() {
      const paths = document.querySelectorAll('#miSvg path');

      // Duración total distribuida entre todos los paths
      const duracionTotal = 4000; // ms
      const duracionPorPath = duracionTotal / paths.length;

      paths.forEach((path, i) => {
        const longitud = path.getTotalLength();

        // Configurar el dash para que empiece invisible
        path.style.strokeDasharray = longitud;
        path.style.strokeDashoffset = longitud;
        path.style.transition = 'none';

        // Forzar reflow para que el navegador registre el estado inicial
        path.getBoundingClientRect();

        // Aplicar la transición con delay según el índice
        const delay = i * (duracionTotal / paths.length / 1.2);
        path.style.transition = `stroke-dashoffset ${duracionPorPath * 1.5}ms ease ${delay}ms`;
        path.style.strokeDashoffset = '0';
      });
    }

    function reiniciar() {
      const paths = document.querySelectorAll('#miSvg path');
      paths.forEach(path => {
        const longitud = path.getTotalLength();
        path.style.transition = 'none';
        path.style.strokeDasharray = longitud;
        path.style.strokeDashoffset = longitud;
      });
      // Pequeño delay para que el reset se aplique antes de reanimar
      setTimeout(animarTrazo, 50);
    }

    // Arrancar automáticamente al cargar
    window.addEventListener('load', animarTrazo);
  </script>
